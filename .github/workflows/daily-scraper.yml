name: Daily Game Scraper

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: '0 6 * * *'
  # Run manually from the GitHub Actions tab anytime
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache pip packages to speed up future runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install Python dependencies from requirements.txt
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 5. Write the Google credentials JSON from the GitHub Secret
      - name: Write Google Credentials
        run: echo '${{ secrets.GCP_CREDENTIALS_JSON }}' > google-credentials.json

      # 6. Run the scraper
      - name: Run Scraper
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python scraper.py
