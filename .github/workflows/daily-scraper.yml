name: Daily Game Scraper & Database Sync

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Node Dependencies
        run: npm ci --omit=dev || npm install

      # 1. Sync database from user's Google Sheet into games.json & fallback_games.csv
      - name: Sync games.json from Google Sheets
        run: node generate-games-json.js

      # 2. Check AN1 for fresh releases (safe 3-page scan, preserves Google Sheet)
      - name: Run AN1 Scraper for Fresh Releases
        run: node auto-fetcher.js
        env:
          MAX_PAGES: "3"

      # 3. Generate updated sitemap.xml
      - name: Generate sitemap.xml
        run: node scripts/generate-sitemap.js

      # 4. Commit updated games.json, fallback_games.csv, and sitemap.xml
      - name: Commit and Push Updated Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json fallback_games.csv sitemap.xml
          git diff --cached --quiet || git commit -m "🔄 Auto-sync database & games.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
