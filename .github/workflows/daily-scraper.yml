name: Daily Game Scraper

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    # This is the optimal schedule to keep the site updated quickly
    # while completely avoiding IP bans/rate limits from the source site.
    - cron: '0 */6 * * *'
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo (with token for pushing back)
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache pip to speed up future runs
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # 4. Install Python dependencies
      - name: Install Dependencies
        run: pip install -r requirements.txt

      # 5. Run the scraper — credentials are passed as env vars (no file needed)
      - name: Run Scraper
        env:
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python scraper.py

      # 6. Set up Node.js and export games.json from the updated sheet
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: npm ci --omit=dev

      - name: Export games.json from Google Sheets
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: node generate-games-json.js

      # 7. Commit updated games.json + fallback CSV back to the repo
      - name: Commit games.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json fallback_games.csv
          git diff --cached --quiet || git commit -m "🔄 Auto-update games.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
