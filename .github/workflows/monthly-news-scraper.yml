name: Monthly Mobile Gaming News Scraper

on:
  schedule:
    # Runs at 00:00 on the 1st day of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  scrape-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Execute Mobile Gaming News Scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          NEWS_SPREADSHEET_ID: '1tTj87haZmLRnDyLZwCHgNhSRsCLaRXBAiylNswzPlpY'
        run: node scripts/fetch-mobile-news.js

      - name: Commit and Push Updated news.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No news dataset changes to commit."
          else
            git commit -m "chore(automation): monthly mobile gaming news auto-update [mobilegamer.biz]"
            git push
          fi
