name: Monthly Trending Games Update

on:
  schedule:
    # Run at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-games-and-date:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Fetch fresh games
        run: node auto-fetcher.js
        env:
          # If your auto-fetcher needs any secrets, they should be mapped here
          # GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          NODE_ENV: production

      - name: Update Month Texts
        run: node scripts/update-month.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add games.json index.html best-games.html
          git commit -m "Automated monthly update: Fetch fresh games & update month string" || echo "No changes to commit"
          git push
