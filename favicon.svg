<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <radialGradient id="body" cx="38%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="55%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="rim" cx="28%" cy="22%" r="65%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.16)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="amb" cx="30%" cy="25%" r="75%">
      <stop offset="0%" stop-color="rgba(255,107,0,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,107,0,0)"/>
    </radialGradient>
    <radialGradient id="hub" cx="32%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d4d4d4"/>
      <stop offset="100%" stop-color="#888888"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>


  <!-- Outer glow ring -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,107,0,0.18)" stroke-width="6"/>

  <!-- Vault body (3D metallic) -->
  <circle cx="50" cy="50" r="42" fill="url(#body)"/>
  <circle cx="50" cy="50" r="42" fill="url(#amb)"/>
  <circle cx="50" cy="50" r="42" fill="url(#rim)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2"/>

  <!-- Depth ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>

  <!-- Amber spokes (main cross) with glow -->
  <g filter="url(#glow)">
    <line x1="50" y1="8"  x2="50" y2="22"  stroke="#FF6B00" stroke-width="4"   stroke-linecap="round"/>
    <line x1="50" y1="78" x2="50" y2="92"  stroke="#FF6B00" stroke-width="4"   stroke-linecap="round"/>
    <line x1="8"  y1="50" x2="22" y2="50"  stroke="#FF6B00" stroke-width="4"   stroke-linecap="round"/>
    <line x1="78" y1="50" x2="92" y2="50"  stroke="#FF6B00" stroke-width="4"   stroke-linecap="round"/>
    <!-- Diagonal spokes -->
    <line x1="20" y1="20" x2="30" y2="30"  stroke="rgba(255,180,60,0.6)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="70" y1="70" x2="80" y2="80"  stroke="rgba(255,180,60,0.6)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="80" y1="20" x2="70" y2="30"  stroke="rgba(255,180,60,0.6)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="80" x2="30" y2="70"  stroke="rgba(255,180,60,0.6)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 3D center hub -->
  <circle cx="50" cy="50" r="9" fill="url(#hub)"/>
  <circle cx="50" cy="50" r="3.5" fill="rgba(0,0,0,0.75)"/>

  <!-- Specular highlight (3D illusion) -->
  <ellipse cx="35" cy="30" rx="9" ry="6" fill="rgba(255,255,255,0.07)" transform="rotate(-30 35 30)"/>

  <!-- Amber bolt holes -->
  <circle cx="50" cy="5"  r="3.2" fill="#FF6B00" opacity="0.85"/>
  <circle cx="50" cy="95" r="3.2" fill="#FF6B00" opacity="0.85"/>
  <circle cx="5"  cy="50" r="3.2" fill="#FF6B00" opacity="0.85"/>
  <circle cx="95" cy="50" r="3.2" fill="#FF6B00" opacity="0.85"/>
</svg>
